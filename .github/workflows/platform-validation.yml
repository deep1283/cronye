name: Platform Validation

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  daemon-build-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runs_on: macos-14
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: daemon/go.mod

      - name: Build and test daemon
        shell: bash
        run: |
          set -euo pipefail
          cd daemon
          mkdir -p .cache/go-build .cache/gomod ../dist/ci
          export GOCACHE="$PWD/.cache/go-build"
          export GOMODCACHE="$PWD/.cache/gomod"

          go test ./...

          daemon_bin="cronye-daemon-${{ matrix.goos }}-${{ matrix.goarch }}"
          license_bin="cronye-licensegen-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            daemon_bin="${daemon_bin}.exe"
            license_bin="${license_bin}.exe"
          fi

          CGO_ENABLED=1 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X github.com/cronye/daemon/internal/version.BuildVersion=ci-${GITHUB_SHA}" \
            -o "../dist/ci/${daemon_bin}" ./cmd/daemon

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags "-X github.com/cronye/daemon/internal/version.BuildVersion=ci-${GITHUB_SHA}" \
            -o "../dist/ci/${license_bin}" ./cmd/licensegen

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: daemon-binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/ci/*
          if-no-files-found: error
